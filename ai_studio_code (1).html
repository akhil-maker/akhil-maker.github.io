<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Gesture Particles</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #container { position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; }
        
        /* UI Elements */
        #ui { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; text-shadow: 1px 1px 2px black; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; }
        
        /* Hidden Video for MediaPipe */
        #input_video { display: none; }
        
        /* Shape Indicator */
        #status { position: absolute; bottom: 20px; width: 100%; text-align: center; color: #0ff; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="container">
        <div id="loading">Initializing Camera & AI...</div>
        <div id="ui">
            <div>Gestures:</div>
            <div>• Open/Close Hand = Expand/Contract</div>
            <div>• Move Hand = Change Color/Rotate</div>
            <div>• Pinch = Switch Shape</div>
        </div>
        <div id="status">Shape: Sphere</div>
        <video id="input_video" playsinline></video>
    </div>

    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script id="vertexShader" type="x-shader/x-vertex">
        uniform float uTime;
        uniform float uExpansion;
        uniform float uTemplate; // 0: Sphere, 1: Heart, 2: Saturn, 3: Flower
        attribute vec3 aRandom;
        varying vec3 vColor;
        varying float vDistance;

        #define PI 3.14159265359

        void main() {
            vec3 pos = vec3(0.0);
            
            // --- TEMPLATE 0: SPHERE ---
            if (uTemplate < 0.5) {
                float phi = aRandom.x * PI;
                float theta = aRandom.y * 2.0 * PI;
                pos = vec3(sin(phi)*cos(theta), cos(phi), sin(phi)*sin(theta)) * 2.0;
            }
            // --- TEMPLATE 1: HEART ---
            else if (uTemplate < 1.5) {
                float t = aRandom.y * 2.0 * PI;
                pos.x = 16.0 * pow(sin(t), 3.0);
                pos.y = 13.0 * cos(t) - 5.0 * cos(2.0*t) - 2.0 * cos(3.0*t) - cos(4.0*t);
                pos.z = (aRandom.x - 0.5) * 5.0;
                pos *= 0.15;
            }
            // --- TEMPLATE 2: SATURN ---
            else if (uTemplate < 2.5) {
                if(aRandom.z > 0.5) { // Body
                    float phi = aRandom.x * PI;
                    float theta = aRandom.y * 2.0 * PI;
                    pos = vec3(sin(phi)*cos(theta), cos(phi), sin(phi)*sin(theta)) * 1.5;
                } else { // Ring
                    float r = 2.5 + aRandom.x * 0.8;
                    float theta = aRandom.y * 2.0 * PI;
                    pos = vec3(cos(theta)*r, (aRandom.x-0.5)*0.2, sin(theta)*r);
                }
            }
            // --- TEMPLATE 3: FLOWER ---
            else {
                float k = 5.0;
                float theta = aRandom.y * 2.0 * PI;
                float r = cos(k * theta) * 2.0 + 1.0;
                pos = vec3(cos(theta)*r, sin(theta)*r, (aRandom.x-0.5));
            }

            vec4 mvPosition = modelViewMatrix * vec4(pos * uExpansion, 1.0);
            gl_PointSize = (40.0 / -mvPosition.z) * (1.0 + aRandom.z);
            gl_Position = projectionMatrix * mvPosition;
            
            vDistance = length(pos);
            vColor = vec3(0.5 + 0.5 * sin(uTime + aRandom.x), 0.7, 1.0);
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying vec3 vColor;
        varying float vDistance;
        uniform vec3 uBaseColor;

        void main() {
            float dist = length(gl_PointCoord - vec2(0.5));
            if (dist > 0.5) discard;
            float strength = 1.0 - (dist * 2.0);
            gl_FragColor = vec4(vColor * uBaseColor, strength);
        }
    </script>

    <script>
        let scene, camera, renderer, material, particles;
        let currentTemplate = 0;
        let lastPinchTime = 0;
        const videoElement = document.getElementById('input_video');
        const statusElement = document.getElementById('status');
        const shapes = ["Sphere", "Heart", "Saturn", "Flower"];

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: false }); // Fast rendering
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('container').appendChild(renderer.domElement);

            // Particle Geometry
            const count = 15000; // Optimized for mobile
            const geo = new THREE.BufferGeometry();
            const randoms = new Float32Array(count * 3);
            for(let i=0; i<count*3; i++) randoms[i] = Math.random();
            geo.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 3));

            material = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0 },
                    uExpansion: { value: 1.0 },
                    uTemplate: { value: 0.0 },
                    uBaseColor: { value: new THREE.Color(0x00ffff) }
                },
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            particles = new THREE.Points(geo, material);
            scene.add(particles);

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- MEDIAPIPE LOGIC ---
        function onResults(results) {
            document.getElementById('loading').style.display = 'none';
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];

                // 1. Expansion: Distance between Thumb (4) and Pinky (20)
                const dx = hand[4].x - hand[20].x;
                const dy = hand[4].y - hand[20].y;
                const dist = Math.sqrt(dx*dx + dy*dy) * 5.0;
                material.uniforms.uExpansion.value = THREE.MathUtils.lerp(material.uniforms.uExpansion.value, dist + 0.5, 0.1);

                // 2. Color: Hand X/Y mapping
                material.uniforms.uBaseColor.value.setHSL(hand[8].x, 0.8, 0.5);

                // 3. Rotation: Subtle tilt based on hand
                particles.rotation.y = (hand[0].x - 0.5) * 2.0;
                particles.rotation.x = (hand[0].y - 0.5) * 2.0;

                // 4. Shape Switching: Pinch detection (Index 8 to Thumb 4)
                const pinchDist = Math.sqrt(Math.pow(hand[8].x - hand[4].x, 2) + Math.pow(hand[8].y - hand[4].y, 2));
                if (pinchDist < 0.04 && Date.now() - lastPinchTime > 1000) {
                    currentTemplate = (currentTemplate + 1) % 4;
                    material.uniforms.uTemplate.value = currentTemplate;
                    statusElement.innerText = "Shape: " + shapes[currentTemplate];
                    lastPinchTime = Date.now();
                }
            }
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 0, // 0 is Lite, best for mobile
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults(onResults);

        const cameraFeed = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 480, height: 640 // Lower resolution for mobile performance
        });

        function animate() {
            requestAnimationFrame(animate);
            material.uniforms.uTime.value += 0.01;
            particles.rotation.y += 0.005; // Constant idle rotation
            renderer.render(scene, camera);
        }

        // Start everything
        initThree();
        animate();
        cameraFeed.start();

    </script>
</body>
</html>
